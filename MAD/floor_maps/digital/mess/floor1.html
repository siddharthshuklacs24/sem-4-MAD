<!DOCTYPE html>
<html>

<head>
<title>Indoor Map Graph Editor</title>

<style>

body{
font-family:Arial;
}

#mapContainer{
position:relative;
display:inline-block;
}

.node{
position:absolute;
width:12px;
height:12px;
background:red;
border-radius:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:2;
}

.label{
position:absolute;
font-size:12px;
font-weight:bold;
transform:translate(8px,-8px);
pointer-events:none;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}

button{
margin:6px;
padding:6px 10px;
}

</style>
</head>

<body>

<h2>Indoor Map Graph Editor</h2>

<div id="mapContainer">

<img src="FLOOR1Digital.png" id="map" width="700">

<canvas id="lines"></canvas>

</div>

<p id="coords"></p>

<button onclick="undoNode()">Undo Node</button>
<button onclick="undoConnection()">Undo Connection</button>
<button onclick="clearAll()">Clear All</button>
<button onclick="downloadNodes()">Download nodes.json</button>
<button onclick="downloadConnections()">Download connections.json</button>
<button onclick="runPathTest()">Test Shortest Path</button>

<h3>Nodes</h3>
<pre id="nodeList"></pre>

<h3>Connections</h3>
<pre id="connList"></pre>

<script>

const img = document.getElementById("map");
const container = document.getElementById("mapContainer");
const canvas = document.getElementById("lines");
const ctx = canvas.getContext("2d");

canvas.width = img.width;
canvas.height = img.height;

let nodes = JSON.parse(localStorage.getItem("map_nodes")) || [];
let connections = JSON.parse(localStorage.getItem("map_connections")) || {};

let nodeElements = {};
let selectedNode = null;
let connectionHistory = [];
let startNode = null;
let endNode = null;

drawSaved();

img.addEventListener("click", function(e){

const rect = img.getBoundingClientRect();

const x = Math.round(e.clientX - rect.left);
const y = Math.round(e.clientY - rect.top);

const node = {
id:"N"+(nodes.length+1),
x:x,
y:y
};

nodes.push(node);

save();

drawNode(node);

});

function undoNode(){

if(nodes.length === 0) return;

const last = nodes.pop();

// remove connections to this node
delete connections[last.id];

for(let k in connections){
connections[k] = connections[k].filter(n => n !== last.id);
}

// reset start/end if deleted
if(startNode && startNode.id === last.id) startNode = null;
if(endNode && endNode.id === last.id) endNode = null;

// save changes
save();

// redraw everything
reload();

}
function drawNode(node){

const dot = document.createElement("div");

dot.className = "node";

dot.style.left = node.x + "px";
dot.style.top = node.y + "px";

dot.onclick = function(e){

e.stopPropagation();

nodeClick(node,dot,e);

};

container.appendChild(dot);

nodeElements[node.id] = dot;

// color logic
if(startNode && startNode.id === node.id){
dot.style.background = "green";
}

if(endNode && endNode.id === node.id){
dot.style.background = "blue";
}

const label = document.createElement("div");

label.className = "label";

label.innerText = node.id;

label.style.left = node.x + "px";
label.style.top = node.y + "px";

container.appendChild(label);

}

function nodeClick(node,dot,event){

// SHIFT = rename
if(event.shiftKey){

const newId = prompt("Rename node:", node.id);

if(newId && newId !== node.id){

const oldId = node.id;

node.id = newId;

// update connection keys
if(connections[oldId]){
connections[newId] = connections[oldId];
delete connections[oldId];
}

// update references inside arrays
for(let k in connections){
connections[k] = connections[k].map(n => n === oldId ? newId : n);
}

save();
reload();

}

return;

}
// ALT = start node toggle
if(event.altKey){

if(startNode && startNode.id === node.id){
startNode = null;
reload();
return;
}

startNode = node;
reload();
nodeElements[node.id].style.background = "green";
return;

}

// CTRL = destination node toggle
if(event.ctrlKey){

if(endNode && endNode.id === node.id){
endNode = null;
reload();
return;
}

endNode = node;
reload();
nodeElements[node.id].style.background = "blue";
return;

}

// normal click = connection mode

if(!selectedNode){

selectedNode = node;
dot.style.background = "orange";
return;

}

if(selectedNode.id === node.id){

selectedNode = null;
reload();
return;

}

connect(selectedNode,node);

selectedNode = null;

reload();

}

function connect(a,b){

if(!connections[a.id]) connections[a.id]=[];
if(!connections[b.id]) connections[b.id]=[];

if(!connections[a.id].includes(b.id)){

connections[a.id].push(b.id);
connections[b.id].push(a.id);

// save connection history
connectionHistory.push([a.id,b.id]);

}

save();

}

function undoConnection(){

if(connectionHistory.length === 0) return;

const [a,b] = connectionHistory.pop();

connections[a] = connections[a].filter(n => n !== b);
connections[b] = connections[b].filter(n => n !== a);

save();

reload();

}

function drawLines(){

ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{

if(!connections[n.id]) return;

connections[n.id].forEach(tid=>{

const t=nodes.find(n2=>n2.id===tid);

if(!t) return;

ctx.beginPath();

ctx.moveTo(n.x,n.y);

ctx.lineTo(t.x,t.y);

ctx.strokeStyle="red";

ctx.lineWidth=2;

ctx.stroke();

});

});

}

function drawPath(path){

ctx.beginPath();

ctx.strokeStyle="lime";

ctx.lineWidth=4;

for(let i=0;i<path.length-1;i++){

let a=nodes.find(n=>n.id===path[i]);
let b=nodes.find(n=>n.id===path[i+1]);

ctx.moveTo(a.x,a.y);
ctx.lineTo(b.x,b.y);

}

ctx.stroke();

}

function shortestPath(startId, endId){

let queue=[[startId]];
let visited=new Set();

while(queue.length){

let path=queue.shift();
let nodeId=path[path.length-1];

if(nodeId===endId){
return path;
}

if(!visited.has(nodeId)){

visited.add(nodeId);

let neighbors=connections[nodeId] || [];

for(let n of neighbors){

let newPath=[...path,n];
queue.push(newPath);

}

}

}

return null;

}

function clearAll(){

if(!confirm("Delete all nodes and connections?")) return;

// reset data
nodes = [];
connections = {};
connectionHistory = [];
startNode = null;
endNode = null;
selectedNode = null;

// clear storage
localStorage.removeItem("map_nodes");
localStorage.removeItem("map_connections");

// remove visual nodes
Object.values(nodeElements).forEach(e => e.remove());
document.querySelectorAll(".label").forEach(e => e.remove());

nodeElements = {};

// clear canvas
ctx.clearRect(0,0,canvas.width,canvas.height);

// update lists
updateLists();

}

function runPathTest(){

if(!startNode || !endNode){
alert("Select start (ALT+click) and destination (CTRL+click)");
return;
}

drawLines();

const path = shortestPath(startNode.id, endNode.id);

if(path){
drawPath(path);
}else{
alert("No path found");
}

}

function save(){

localStorage.setItem("map_nodes",JSON.stringify(nodes));
localStorage.setItem("map_connections",JSON.stringify(connections));

updateLists();

}

function drawSaved(){

nodes.forEach(drawNode);

drawLines();

updateLists();

}

function reload(){

Object.values(nodeElements).forEach(e=>e.remove());

document.querySelectorAll(".label").forEach(e=>e.remove());

nodeElements={};

drawSaved();

}

function updateLists(){

document.getElementById("nodeList").textContent=
JSON.stringify(nodes,null,2);

document.getElementById("connList").textContent=
JSON.stringify(connections,null,2);

}

function downloadNodes(){

downloadJSON(nodes,"nodes.json");

}

function downloadConnections(){

downloadJSON(connections,"connections.json");

}

function downloadJSON(data,name){

const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download=name;

a.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
